    <style>
      /* Keeping your original styles */
      body {
        background: #232526;

      .container { width: 100%; max-width: 540px; margin: 0 auto; padding: 15px; }
      form { border-radius: 5px; background-color: #000000a2; padding: 20px; margin-top: 20px; }
      input[type=text] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; color: black; }
      input[type=submit] { width: 100%; background-color: #d9534f; color: white; padding: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

<div class="container">
    <form onsubmit="event.preventDefault(); checkAdminCode();">

        <input type="submit" value="VERIFY ADMIN IDENTITY">
    </form> 

    <script>
    function checkAdminCode() {
      const input = document.getElementById("codeWord").value.trim();
      const savedCode = localStorage.getItem("validPasscode");

      // Check if it's the master admin password
      const isMasterAdmin = (input === "admin_penguin");
      
      // Check if it's a generated Admin code (Starts with ADM-)
      const isGeneratedAdmin = (savedCode && savedCode.startsWith("ADM-") && input === savedCode);

      if (isMasterAdmin || isGeneratedAdmin) {
        // Success!
        window.location.href = "admin.html"; 
      } else {
        alert("❌ UNAUTHORIZED: Access Denied to Admin Sector!");
      }
    }
    </script>
