<!DOCTYPE html>
<html>
<head>
    <title>Passcode System</title>
</head>
<body>

    <h2>Passcode System</h2>
    
    <button id="groupBtn">Generate & Email Group Code</button>
    <button id="adminBtn">Generate & Email Admin Code</button>

    <div id="displayArea" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; display: none; background: #f9f9f9;">
        <p><strong>Status:</strong> Outlook window opened!</p>
        <p><strong>Generated Code:</strong> <span id="passcode" style="font-weight: bold; color: blue;"></span></p>
    </div>

    <script>
        const passcodeLabel = document.getElementById("passcode");
        const displayArea = document.getElementById("displayArea");
        
        const generateCode = () => Math.floor(100000 + Math.random() * 900000);

        function handleRequest(type) {
            const isAdmin = type === 'ADMIN';
            const code = (isAdmin ? "ADM-" : "GRP-") + generateCode();
            
            const recipients = isAdmin 
                ? ["laingp31@shalerarea.org", "kohlerl31@shalerarea.org", "mccannp31@shalerarea.org", "radichb31@shalerarea.org"] 
                : ["laingp31@shalerarea.org", "cookeb31@shalerarea.org", "fitzgeralde31@shalerarea.org", "galfordm31@shalerarea.org", "helblingj31@shalerarea.org", "hoffmanw31@shalerarea.org", "horganp31@shalerarea.org", "kieranm31@shalerarea.org", "kohlerl31@shalerarea.org", "mccannp31@shalerarea.org", "mowreym31@shalerarea.org", "paulovitcha31@shalerarea.org", "paulovitchn31@shalerarea.org", "pingleyh31@shalerarea.org", "radichb31@shalerarea.org", "santuccia31@shalerarea.org", "shepelevm31@shalerarea.org", "szelcs31@shalerarea.org", "wilkinsonj31@shalerarea.org"];

            // 1. Update the page display
            displayArea.style.display = "block";
            passcodeLabel.innerText = code;

            // 2. Format the Outlook 'mailto' link
            const emailTo = recipients.join(";"); // Outlook uses semicolons to separate addresses
            const subject = encodeURIComponent(`${type} Passcode Access`);
            const body = encodeURIComponent(`Your temporary passcode is: ${code}`);

            // 3. Open Outlook
            window.location.href = `mailto:${emailTo}?subject=${subject}&body=${body}`;
        }

        document.getElementById("groupBtn").addEventListener("click", () => handleRequest('GROUP'));
        document.getElementById("adminBtn").addEventListener("click", () => handleRequest('ADMIN'));
    </script>
</body>
</html>
